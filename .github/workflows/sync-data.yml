name: Data Sync Hourly Predictions to Repo
run-name: Syncing hourly predictions for ${{ github.ref_name }} by @${{ github.actor }}

on:
  schedule:
    - cron: '45 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  GCS_PREDS_PREFIX: "structured/preds"
  OUTPUT_DIR: "results"

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Find Latest Run ID and Download Artifacts
        id: download_artifacts
        shell: bash
        run: |
          set -euo pipefail

          LATEST_RUN_DIR=$(gsutil ls -d gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/*/ | tail -1)
          LATEST_RUN_ID=$(echo "$LATEST_RUN_DIR" | sed -E "s|gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/||; s|/||")

          echo "run_id=$LATEST_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Detected latest run ID: $LATEST_RUN_ID"

          mkdir -p "${OUTPUT_DIR}/preds"
          mkdir -p "${OUTPUT_DIR}/perm_importance"

          PREDS_GCS_PATH="gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/${LATEST_RUN_ID}/preds.csv"
          PREDS_LOCAL_PATH="${OUTPUT_DIR}/preds/${LATEST_RUN_ID}-preds.csv"

          if gsutil -q stat "$PREDS_GCS_PATH"; then
            gsutil cp "$PREDS_GCS_PATH" "$PREDS_LOCAL_PATH"
            echo "preds_file=${LATEST_RUN_ID}-preds.csv" >> "$GITHUB_OUTPUT"
            echo "Downloaded preds.csv"
          else
            echo "preds_file=" >> "$GITHUB_OUTPUT"
            echo "No preds.csv found for latest run"
          fi

          PERM_GCS_PATH="gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/${LATEST_RUN_ID}/perm_importance.csv"
          PERM_LOCAL_PATH="${OUTPUT_DIR}/perm_importance/${LATEST_RUN_ID}-perm_importance.csv"

          if gsutil -q stat "$PERM_GCS_PATH"; then
            gsutil cp "$PERM_GCS_PATH" "$PERM_LOCAL_PATH"
            echo "perm_file=${LATEST_RUN_ID}-perm_importance.csv" >> "$GITHUB_OUTPUT"
            echo "Downloaded perm_importance.csv"
          else
            echo "perm_file=" >> "$GITHUB_OUTPUT"
            echo "No perm_importance.csv found for latest run"
          fi

      - name: Commit and Push New Files
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          RUN_ID="${{ steps.download_artifacts.outputs.run_id }}"
          PREDS_FILE="${{ steps.download_artifacts.outputs.preds_file }}"
          PERM_FILE="${{ steps.download_artifacts.outputs.perm_file }}"

          if [[ -n "$PREDS_FILE" ]]; then
            git add "${{ env.OUTPUT_DIR }}/preds/$PREDS_FILE"
          fi

          if [[ -n "$PERM_FILE" ]]; then
            git add "${{ env.OUTPUT_DIR }}/perm_importance/$PERM_FILE"
          fi

          if git diff --cached --quiet; then
            echo "No new tracked changes to commit for run $RUN_ID"
            exit 0
          fi

          git commit -m "Data Sync: Add artifacts for run $RUN_ID"
          git pull --rebase origin main
          git push
